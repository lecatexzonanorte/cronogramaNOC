<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cronograma NOC - Seguimiento de Tareas</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <span class="logo-icon">📡</span>
                    <h1>Cronograma NOC</h1>
                </div>
                <div class="header-actions">
                    <div class="user-selector">
                        <label for="currentUser">Usuario:</label>
                        <select id="currentUser">
                            <option value="">Seleccionar...</option>
                        </select>
                    </div>
                    <button id="addUserBtn" class="btn btn-secondary" title="Agregar usuario">
                        <span>＋</span>
                    </button>
                    <button id="reportBtn" class="btn btn-primary">
                        <span>📊</span> Informe Diario
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Date Selector -->
            <div class="date-bar">
                <button id="prevDay" class="btn-nav">◀</button>
                <div class="current-date">
                    <span id="displayDate"></span>
                </div>
                <button id="nextDay" class="btn-nav">▶</button>
                <button id="todayBtn" class="btn btn-today">Hoy</button>
            </div>

            <!-- Stats Summary -->
            <div class="stats-summary">
                <div class="stat-card">
                    <div class="stat-icon">✅</div>
                    <div class="stat-info">
                        <span class="stat-value" id="completedCount">0</span>
                        <span class="stat-label">Completadas</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">⏳</div>
                    <div class="stat-info">
                        <span class="stat-value" id="pendingCount">0</span>
                        <span class="stat-label">Pendientes</span>
                    </div>
                </div>
                <div class="stat-card progress-card">
                    <div class="stat-icon">📈</div>
                    <div class="stat-info">
                        <span class="stat-value" id="progressPercent">0%</span>
                        <span class="stat-label">Progreso</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                </div>
            </div>

            <!-- Tasks Container -->
            <div class="tasks-container">
                <div class="tasks-header">
                    <h2>📋 Tareas del Día</h2>
                    <button id="addTaskBtn" class="btn btn-secondary">
                        <span>＋</span> Nueva Tarea
                    </button>
                </div>
                
                <div id="tasksList" class="tasks-list">
                    <!-- Tasks will be rendered here -->
                </div>

                <div id="emptyState" class="empty-state hidden">
                    <span class="empty-icon">📝</span>
                    <p>No hay tareas para este día</p>
                    <button class="btn btn-primary" onclick="document.getElementById('addTaskBtn').click()">
                        Agregar primera tarea
                    </button>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>Cronograma NOC © 2024 | Seguimiento de tareas diario</p>
        </footer>
    </div>

    <!-- Modal: Agregar/Editar Tarea -->
    <div id="taskModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="taskModalTitle">Nueva Tarea</h3>
                <button class="modal-close" onclick="closeModal('taskModal')">×</button>
            </div>
            <div class="modal-body">
                <form id="taskForm">
                    <input type="hidden" id="taskId">
                    <div class="form-group">
                        <label for="taskName">Nombre de la tarea *</label>
                        <input type="text" id="taskName" required placeholder="Ej: Revisión de alertas">
                    </div>
                    <div class="form-group">
                        <label for="taskDescription">Descripción</label>
                        <textarea id="taskDescription" rows="3" placeholder="Detalles adicionales..."></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="taskCategory">Categoría</label>
                            <select id="taskCategory">
                                <option value="monitoreo">🔍 Monitoreo</option>
                                <option value="incidentes">🚨 Incidentes</option>
                                <option value="mantenimiento">🔧 Mantenimiento</option>
                                <option value="reportes">📊 Reportes</option>
                                <option value="reuniones">👥 Reuniones</option>
                                <option value="otros">📌 Otros</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="taskPriority">Prioridad</label>
                            <select id="taskPriority">
                                <option value="baja">🟢 Baja</option>
                                <option value="media" selected>🟡 Media</option>
                                <option value="alta">🟠 Alta</option>
                                <option value="critica">🔴 Crítica</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="taskTime">Hora programada</label>
                        <input type="time" id="taskTime">
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" onclick="closeModal('taskModal')">Cancelar</button>
                        <button type="submit" class="btn btn-primary">Guardar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Modal: Informe Diario -->
    <div id="reportModal" class="modal">
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h3>📊 Informe Diario</h3>
                <button class="modal-close" onclick="closeModal('reportModal')">×</button>
            </div>
            <div class="modal-body">
                <div class="report-date-selector">
                    <label>Ver informe del:</label>
                    <input type="date" id="reportDate">
                </div>
                
                <div id="reportContent" class="report-content">
                    <!-- Report will be rendered here -->
                </div>

                <div class="report-actions">
                    <button id="copyReportBtn" class="btn btn-secondary">
                        📋 Copiar al portapapeles
                    </button>
                    <button id="exportReportBtn" class="btn btn-primary">
                        📥 Exportar
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal: Agregar Usuario -->
    <div id="userModal" class="modal">
        <div class="modal-content modal-small">
            <div class="modal-header">
                <h3>👤 Nuevo Usuario</h3>
                <button class="modal-close" onclick="closeModal('userModal')">×</button>
            </div>
            <div class="modal-body">
                <form id="userForm">
                    <div class="form-group">
                        <label for="userName">Nombre del usuario *</label>
                        <input type="text" id="userName" required placeholder="Ej: Juan Pérez">
                    </div>
                    <div class="form-group">
                        <label for="userShift">Turno</label>
                        <select id="userShift">
                            <option value="mañana">🌅 Mañana (06:00 - 14:00)</option>
                            <option value="tarde">☀️ Tarde (14:00 - 22:00)</option>
                            <option value="noche">🌙 Noche (22:00 - 06:00)</option>
                        </select>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" onclick="closeModal('userModal')">Cancelar</button>
                        <button type="submit" class="btn btn-primary">Crear Usuario</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <!-- App Scripts -->
    <script src="js/firebase-config.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
